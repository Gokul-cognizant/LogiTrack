<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">L</span>
      <div>
        <div class="brand-name">LogiTrack</div>
        <div class="brand-sub">Freight & Fleet</div>
      </div>
    </div>

    <nav class="nav">
      @for (item of visibleNav(); track item) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item">
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">{{ (user()?.email || '?').charAt(0).toUpperCase() }}</div>
        <div class="user-info">
          <div class="user-email" [title]="user()?.email">{{ user()?.email }}</div>
          <div class="user-role">{{ roleLabel() }}</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-spacer"></div>
      <button class="bell" (click)="toggleNotifs()" aria-label="Notifications">
        <span class="bell-icon">✉</span>
        @if (unread() > 0) {
          <span class="bell-badge">{{ unread() > 99 ? '99+' : unread() }}</span>
        }
      </button>
    </header>

    <router-outlet></router-outlet>
  </main>

  @if (panelOpen()) {
    <app-notification-panel (close)="closeNotifs()"></app-notification-panel>
  }
</div>
